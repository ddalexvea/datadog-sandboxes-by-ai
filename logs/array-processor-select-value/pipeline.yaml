id: REPLACE_WITH_APP_ID
# See app_id in your integration's manifest.json file to learn more:
# https://docs.datadoghq.com/developers/integrations/check_references/#manifest-file
metric_id: REPLACE_WITH_APP_ID
# If for some reason id must be different than app_id, add the app_id in this field instead.
# If id and app_id already match, this field can be left blank.
backend_only: false
facets: null
pipeline:
  type: pipeline
  name: Array Processor - Select Value Sandbox
  enabled: true
  filter:
    query: service:array-processor-sandbox
  processors:
    - type: array-processor
      name: Extract request from matching provider
      enabled: true
      operation:
        source: providers
        target: matched_request
        filter: name:target-provider
        valueToExtract: request_body
        type: select
    - type: array-processor
      name: Extract response from matching provider
      enabled: true
      operation:
        source: providers
        target: matched_response
        filter: name:target-provider
        valueToExtract: response_body
        type: select
